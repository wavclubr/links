<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAV.CLUB</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/CSZFZIP.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        /* Gradiente inspirado no fundo da imagem */
        background: radial-gradient(circle at center, #ffcc00 0%, #ff4d00 50%, #800000 100%);
        background-attachment: fixed;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
    }

    .linktree-card {
        max-width: 620px;
        width: 100%;
        /* Vidro escuro para contrastar com o fundo vibrante */
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border-radius: 3.5rem 3.5rem 2.5rem 2.5rem;
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
        padding: 2.5rem 2rem 2.8rem;
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 204, 0, 0.2);
    }

    .profile {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 2rem;
    }

    /* Estilo de borda compartilhada para elementos circulares */
    .avatar, .resident-img {
        border-radius: 50%;
        /* Borda alaranjada espessa com textura sutil */
        border: 4px solid #ff5500; 
        box-shadow: 0 0 15px rgba(255, 85, 0, 0.6), inset 0 0 10px rgba(0,0,0,0.5);
        overflow: hidden;
        transition: all 0.3s ease;
    }

    .avatar {
        width: 130px;
        height: 130px;
        margin-bottom: 1.2rem;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Brilho extra no avatar principal */
    .avatar:hover {
        border-color: #ffcc00;
        box-shadow: 0 0 25px rgba(255, 204, 0, 0.8);
    }

    .avatar-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .links {
        display: flex;
        flex-direction: column;
        gap: 1.1rem;
        margin: 2.2rem 0;
    }

    .link-item {
        display: flex;
        align-items: center;
        gap: 1.2rem;
        background: rgba(255, 255, 255, 0.05);
        padding: 1.1rem 1.8rem;
        border-radius: 180px;
        text-decoration: none;
        color: #ffffff;
        font-weight: 600;
        font-size: 1rem;
        border: 1px solid rgba(255, 204, 0, 0.3);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        text-transform: uppercase;
    }

    .link-item i {
        font-size: 1.3rem;
        width: 2rem;
        text-align: center;
        /* Ícones na cor amarela vibrante da logo */
        color: #ffcc00;
    }

    .link-item span {
        flex: 1;
        letter-spacing: 1px;
    }

    .link-item .arrow {
        font-size: 0.9rem;
        color: #ffcc00;
        opacity: 0.5;
    }

    /* Hover com as cores da logo */
    .link-item:hover {
        background: #ffcc00;
        color: #000;
        transform: scale(1.02);
        box-shadow: 0 0 20px rgba(255, 204, 0, 0.6);
    }

    .link-item:hover i, 
    .link-item:hover .arrow {
        color: #000;
        opacity: 1;
    }

    .residents-section {
        display: flex; 
        justify-content: center; 
        gap: 1.5rem; 
        margin-top: 2rem; 
        flex-wrap: wrap;
    }

    .resident-card {
        text-decoration: none; 
        text-align: center;
        transition: 0.3s;
    }

    .resident-img {
        width: 75px; 
        height: 75px; 
        object-fit: cover;
        /* Borda alaranjada texturizada aplicada */
        border-color: #ff5500; 
    }

    .resident-card:hover .resident-img {
        border-color: #ffcc00;
        transform: translateY(-5px);
        box-shadow: 0 5px 20px rgba(255, 204, 0, 0.6);
    }

    .resident-name {
        display: block; 
        color: #fff; 
        font-size: 0.7rem; 
        margin-top: 0.5rem;
        font-weight: 600;
        opacity: 0.8;
    }

    .footer-note {
        text-align: center;
        margin-top: 2.5rem;
        font-size: 0.75rem;
        color: #ffcc00;
        border-top: 1px solid rgba(255, 204, 0, 0.2);
        padding-top: 1.5rem;
        letter-spacing: 3px;
        font-weight: bold;
    }

    @media (max-width: 480px) {
        .linktree-card {
            padding: 2rem 1.2rem;
            border-radius: 2.5rem;
        }
    }
</style>
</head>
<body>
    <div class="linktree-card">

        <div class="profile">
            <div class="avatar">
                <img src="https://i.imgur.com/ROlVEEX.jpeg" alt="WAV.CLUB logo" class="avatar-img">
            </div>
        </div>

        <div class="links">
            <a href="https://shotgun.live/events/wav-club-5" class="link-item" target="_blank" rel="noopener">
                <i class="fas fa-ticket-alt"></i>
                <span>SHTOGUN · INGRESSOS WAVSESSIONS · 24 abr</span>

            </a>
            
            <a href="https://www.streetverse.com.br/collections/wav-club-collab" class="link-item" target="_blank" rel="noopener">
                <i class="fas fa-tshirt"></i>
                <span>COLLAB · STREET VERSE X WAVClub</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <a href="https://x.com/wavclubr" class="link-item" target="_blank" rel="noopener">
                <i class="fa-brands fa-twitter"></i>

                <i class="fas fa-chevron-right arrow"></i>
            </a>
            
            <a href="https://www.youtube.com/@wavclubr" class="link-item" target="_blank" rel="noopener">
                <i class="fab fa-youtube"></i>
                <span>YOUTUBE · @wavclubr</span>

            </a>

            <a href="https://www.instagram.com/wav.clubr/" class="link-item" target="_blank" rel="noopener">
                <i class="fab fa-instagram"></i>
                <span>INSTAGRAM · @wav.clubr</span>

            </a>

            <a href="https://drive.google.com/drive/u/4/folders/1n83raPdsL67bQUyJUJMSJ5cnjEG6waVW" class="link-item" target="_blank" rel="noopener">
                <i class="fab fa-google-drive"></i>
                <span>DRIVE · FOTOS WAV IV</span>

            </a>
        </div>
        
        <h2 style="
            color: #ffcc00; 
            text-align: center; 
            font-size: 1.4rem; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            margin-bottom: 2rem; 
            font-weight: 800;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.8), 0 0 20px rgba(255, 77, 0, 0.4);
            filter: drop-shadow(0px 0px 2px rgba(0,0,0,0.5));
        ">
            WAVClub DJs
        </h2>
  
        <div class="residents-section">
            <a href="https://www.instagram.com/marvinwav/" class="resident-card" target="_blank" rel="noopener">
                <img src="https://i.imgur.com/zRuT3M2.jpg" alt="Marvin" class="resident-img">
                <span class="resident-name">@marvinwav</span>
            </a>

            <a href="https://www.instagram.com/leozazaia/" class="resident-card" target="_blank" rel="noopener">
                <img src="https://i.imgur.com/UqhAzMG.jpg" alt="Leo Zazaia" class="resident-img">
                <span class="resident-name">@leozazaia</span>
            </a>

            <a href="https://www.instagram.com/iavicious/" class="resident-card" target="_blank" rel="noopener">
                <img src="https://i.imgur.com/OdKraEt.jpg" alt="Iavicious" class="resident-img">
                <span class="resident-name">@iavicious</span>
            </a>

            <a href="https://www.instagram.com/kalygula_/" class="resident-card" target="_blank" rel="noopener">
                <img src="https://i.imgur.com/WBrCB6Z.jpg" alt="Kalygula" class="resident-img">
                <span class="resident-name">@kalygula_</span>
            </a>
        </div> 

        <div class="footer-note">
            <i class="fas fa-wave-square"></i>  WAV.CLUB · 2026  <i class="fas fa-wave-square"></i>
        </div>
    </div>
</body>
</html>
