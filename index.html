<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAV.CLUB</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/CSZFZIP.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            /* Fundo escuro profundo combinando com a logo */
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .linktree-card {
            max-width: 620px;
            width: 100%;
            /* Vidro fumê escuro */
            background: rgba(15, 15, 15, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 3.5rem 3.5rem 2.5rem 2.5rem;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            padding: 2.5rem 2rem 2.8rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            /* Borda prateada/branca conforme a logo */
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            margin-bottom: 1.2rem;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
            margin: 2.2rem 0;
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            /* Fundo preto semi-transparente */
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem 1.8rem;
            border-radius: 180px;
            text-decoration: none;
            color: #ffffff;
            font-weight: 500;
            font-size: 1.1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .link-item i {
            font-size: 1.5rem;
            width: 2rem;
            text-align: center;
            color: #ffffff;
        }

        .link-item span {
            flex: 1;
            letter-spacing: 0.5px;
        }

        .link-item .arrow {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        /* Hover estilo Premium / Minimalista */
        .link-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .link-item:hover .arrow {
            transform: translateX(5px);
            color: #fff;
        }

        /* Estilização dos Residentes */
        .residents-section {
            display: flex; 
            justify-content: center; 
            gap: 1.5rem; 
            margin-top: 2rem; 
            flex-wrap: wrap;
        }

        .resident-card {
            text-decoration: none; 
            text-align: center;
            transition: 0.3s;
        }

        .resident-card:hover {
            transform: scale(1.1);
        }

        .resident-img {
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            border: 1px solid rgba(255,255,255,0.2); 
            object-fit: cover;
            filter: grayscale(20%); /* Leve toque sóbrio */
            transition: 0.3s;
        }

        .resident-card:hover .resident-img {
            border-color: #fff;
            filter: grayscale(0%);
        }

        .resident-name {
            display: block; 
            color: rgba(255,255,255,0.6); 
            font-size: 0.75rem; 
            margin-top: 0.5rem;
            font-weight: 500;
        }

        .footer-note {
            text-align: center;
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @media (max-width: 480px) {
            .linktree-card {
                padding: 2rem 1.2rem;
                border-radius: 2.5rem;
            }
            .link-item {
                font-size: 1rem;
                padding: 0.9rem 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="linktree-card">

                <i class="fas fa-tshirt"></i>
                <span>COLLAB · STREET VERSE X WAV</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>
            
            <a href="https://www.youtube.com/@wavclubr" class="link-item" target="_blank" rel="noopener">
                <i class="fab fa-youtube"></i>
                <span>YOUTUBE · WAV.CLUB</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <a href="https://www.instagram.com/wav.clubr/" class="link-item" target="_blank" rel="noopener">
                <i class="fab fa-instagram"></i>
                <span>INSTAGRAM · @WAV.CLUBR</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <a href="https://soundcloud.com/wav-club-radio" class="link-item" target="_blank" rel="noopener">
                <i class="fab fa-soundcloud"></i>
                <span>SOUNDCLOUD · WAV.STATION</span>

            </a>

            <a href="https://drive.google.com/drive/u/4/folders/1n83raPdsL67bQUyJUJMSJ5cnjEG6waVW" class="link-item" target="_blank" rel="noopener">
                <i class="fab fa-google-drive"></i>
                <span>DRIVE · FOTOS WAV IV</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>
        </div>
  
        <div class="residents-section">
            <a href="https://www.instagram.com/marvinwav/" class="resident-card" target="_blank" rel="noopener">
                <img src="https://i.imgur.com/zRuT3M2.jpg" alt="Marvin" class="resident-img">
                <span class="resident-name">@marvinwav</span>
            </a>

            <a href="https://www.instagram.com/leozazaia/" class="resident-card" target="_blank" rel="noopener">
                <img src="https://i.imgur.com/UqhAzMG.jpg" alt="Leo Zazaia" class="resident-img">
                <span class="resident-name">@leozazaia</span>
            </a>

            <a href="https://www.instagram.com/iavicious/" class="resident-card" target="_blank" rel="noopener">
                <img src="https://i.imgur.com/OdKraEt.jpg" alt="Iavicious" class="resident-img">
                <span class="resident-name">@iavicious</span>
            </a>

            <a href="https://www.instagram.com/kalygula_/" class="resident-card" target="_blank" rel="noopener">
                <img src="https://i.imgur.com/WBrCB6Z.jpg" alt="Kalygula" class="resident-img">
                <span class="resident-name">@kalygula_</span>
            </a>
        </div> 

        <div class="footer-note">
            <i class="fas fa-wave-square"></i>  WAV.CLUB · 2026  <i class="fas fa-wave-square"></i>
        </div>
    </div>
</body>
</html>
