<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAV.CLUB</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/CSZFZIP.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        background: radial-gradient(circle at center, #ffcc00 0%, #ff4d00 50%, #800000 100%);
        background-attachment: fixed;
        min-height: 100vh;
        display: flex;
        justify-content: center; /* Centraliza o conteúdo horizontalmente */
        align-items: center;
        padding: 2rem 1.5rem;
        position: relative;
    }

    /* Textura Halftone */
    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: radial-gradient(rgba(0,0,0,0.15) 1px, transparent 1px);
        background-size: 4px 4px;
        pointer-events: none;
        z-index: 0;
    }

    /* Wrapper principal para permitir o posicionamento da sidebar */
    .main-wrapper {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        width: 100%;
        max-width: 1400px;
        position: relative;
        z-index: 1;
    }

    /* SEÇÃO DE SETS (ESQUERDA) - Flutuante no Desktop */
    .sets-section {
        position: absolute;
        left: 0;
        width: 300px;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    /* Estilização do Título dos Sets para Legibilidade */
    .sets-title {
        color: #ffcc00;
        font-size: 1.1rem;
        text-transform: uppercase;
        letter-spacing: 3px;
        font-weight: 800;
        text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        /* Fundo escuro transparente, padding e bordas arredondadas */
        background: rgba(0, 0, 0, 0.6); 
        padding: 0.8rem 1rem;
        border-radius: 8px;
        border: 1px solid rgba(255, 85, 0, 0.2); /* Borda sutil alaranjada */
    }

    .soundcloud-wrapper {
        background: rgba(0, 0, 0, 0.5);
        border-radius: 12px;
        padding: 8px;
        border: 1px solid rgba(255, 85, 0, 0.3);
        transition: 0.3s;
    }

    .soundcloud-wrapper:hover {
        border-color: #ffcc00;
        transform: scale(1.03);
    }

    /* CARD PRINCIPAL - CENTRALIZADO */
    .linktree-card {
        width: 100%;
        max-width: 580px;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border-radius: 3.5rem;
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
        padding: 2.5rem 2rem;
        border: 1px solid rgba(255, 204, 0, 0.2);
    }

    /* Estilos de Elementos (Avatar, Links, Residents) */
    .profile { display: flex; flex-direction: column; align-items: center; margin-bottom: 2rem; }
    
    .avatar, .resident-img {
        border-radius: 50%;
        border: 4px solid #ff5500; 
        box-shadow: 0 0 15px rgba(255, 85, 0, 0.6);
        overflow: hidden;
    }

    .avatar { width: 130px; height: 130px; background: #000; display: flex; align-items: center; justify-content: center; }
    .avatar-img { width: 100%; height: 100%; object-fit: cover; }

    .links { display: flex; flex-direction: column; gap: 1rem; margin: 2rem 0; }

    .link-item {
        display: flex; align-items: center; gap: 1.2rem;
        background: rgba(255, 255, 255, 0.05);
        padding: 1rem 1.8rem;
        border-radius: 180px;
        text-decoration: none;
        color: #ffffff;
        font-weight: 600;
        border: 1px solid rgba(255, 204, 0, 0.2);
        transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        text-transform: uppercase;
    }

    .link-item i { color: #ffcc00; width: 20px; text-align: center; }
    .link-item span { flex: 1; letter-spacing: 1px; }

    .link-item:hover {
        background: #ffcc00;
        color: #000;
        transform: scale(1.02);
    }
    .link-item:hover i { color: #000; }

    .residents-section { display: flex; justify-content: center; gap: 1.2rem; margin-top: 1.5rem; flex-wrap: wrap; }
    .resident-card { text-decoration: none; text-align: center; transition: 0.3s; }
    .resident-img { width: 70px; height: 70px; object-fit: cover; border-width: 3px; }
    .resident-name { display: block; color: #fff; font-size: 0.65rem; margin-top: 0.5rem; font-weight: 600; opacity: 0.7; }

    .footer-note {
        text-align: center; margin-top: 2rem; font-size: 0.7rem;
        color: #ffcc00; border-top: 1px solid rgba(255, 204, 0, 0.1);
        padding-top: 1.5rem; letter-spacing: 2px;
    }

    /* RESPONSIVIDADE */
    @media (max-width: 1200px) {
        .sets-section {
            position: relative;
            width: 100%;
            max-width: 580px;
            margin-bottom: 2rem;
        }
        .main-wrapper {
            flex-direction: column;
            align-items: center;
        }
    }
    </style>
</head>
